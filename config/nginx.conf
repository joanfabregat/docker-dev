events {
    worker_connections 1024;
}

stream {
    # Docker embedded DNS resolver
    resolver 127.0.0.11 valid=10s;

    # Map TLS SNI hostname to the correct project Pomerium
    map $ssl_preread_server_name $tls_backend {
        ~\.aritas\.dev\.ffwip\.com$    aritas-si-pomerium:443;
        ~\.sophos\.dev\.ffwip\.com$    sophos-pomerium:443;
        # Add more projects:
        # ~\.projectx\.dev\.ffwip\.com$  projectx-pomerium:443;
    }

    # Map SNI hostname for HTTP redirect
    map $ssl_preread_server_name $http_backend {
        ~\.aritas\.dev\.ffwip\.com$    aritas-si-pomerium:80;
        ~\.sophos\.dev\.ffwip\.com$    sophos-pomerium:80;
    }

    # HTTPS (SNI-based routing, TCP pass-through)
    server {
        listen 443;
        ssl_preread on;
        proxy_pass $tls_backend;
    }

    # HTTP (redirect to HTTPS, handled by each Pomerium)
    server {
        listen 80;
        proxy_pass $http_backend;
    }
}
