events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;

    # Shared TLS settings
    ssl_certificate     /etc/nginx/certs/dev.ffwip.com.pem;
    ssl_certificate_key /etc/nginx/certs/dev.ffwip.com-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- HTTP → HTTPS redirect (all hosts) ---
    server {
        listen 80;
        server_name *.aritas.dev.ffwip.com
                    *.sophos.dev.ffwip.com
                    sophos-pub.dev.ffwip.com *.sophos-pub.dev.ffwip.com
                    dtpdf.dev.ffwip.com *.dtpdf.dev.ffwip.com;

        return 301 https://$host$request_uri;
    }

    # --- Sophos: Pomerium (auth + all routes) ---
    server {
        listen 443 ssl;
        server_name auth.sophos.dev.ffwip.com
                    classic.sophos.dev.ffwip.com
                    classic-encore.sophos.dev.ffwip.com
                    api.sophos.dev.ffwip.com
                    vector.sophos.dev.ffwip.com
                    pma.sophos.dev.ffwip.com
                    files.sophos.dev.ffwip.com
                    s3.sophos.dev.ffwip.com
                    qdrant.sophos.dev.ffwip.com
                    mailpit.sophos.dev.ffwip.com;

        location / {
            set $upstream_sophos http://sophos-pomerium:80;
            proxy_pass $upstream_sophos;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    # --- Sophos POC Publication: Pomerium (auth + route) ---
    server {
        listen 443 ssl;
        server_name sophos-pub.dev.ffwip.com
                    auth.sophos-pub.dev.ffwip.com;

        location / {
            set $upstream_sophos_pub http://sophos-poc-publication-pomerium:80;
            proxy_pass $upstream_sophos_pub;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    # --- Aritas: main app ---
    server {
        listen 443 ssl;
        server_name intranet.aritas.dev.ffwip.com
                    formateur.aritas.dev.ffwip.com
                    apprenant.aritas.dev.ffwip.com
                    inscription.aritas.dev.ffwip.com;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        location / {
            set $upstream_aritas http://aritas-si:80;
            proxy_pass $upstream_aritas;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # --- Aritas: Encore dev server (WebSocket) ---
    server {
        listen 443 ssl;
        server_name encore.aritas.dev.ffwip.com;

        location / {
            set $upstream_encore http://aritas-si-encore:9000;
            proxy_pass $upstream_encore;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    # --- Aritas: phpMyAdmin ---
    server {
        listen 443 ssl;
        server_name pma.aritas.dev.ffwip.com;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        location / {
            set $upstream_pma http://aritas-si-phpmyadmin:80;
            proxy_pass $upstream_pma;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # --- DTPDF ---
    server {
        listen 443 ssl;
        server_name dtpdf.dev.ffwip.com;

        location / {
            set $upstream_dtpdf http://dtpdf-backend:8080;
            proxy_pass $upstream_dtpdf;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
