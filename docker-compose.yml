services:
  sni-proxy:
    container_name: sni-proxy
    image: nginx:alpine
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    networks:
      - sophos-network
      - aritas-network

networks:
  sophos-network:
    external: true
  aritas-network:
    external: true
