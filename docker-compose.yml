services:
  dev-proxy:
    container_name: dev-proxy
    image: nginx:alpine
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/certs:/etc/nginx/certs:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    networks:
      - sophos-network
      - aritas-network
      - dtpdf-network
      - fogandfrog-web-network
      - email-signatures-network

networks:
  sophos-network:
    external: true
  aritas-network:
    external: true
  dtpdf-network:
    external: true
  fogandfrog-web-network:
    external: true
  email-signatures-network:
    external: true
